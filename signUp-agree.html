<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입-약관동의 및 인증</title>
    <link rel="stylesheet" href="./css/font.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/system.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/index.css">

    <link rel="stylesheet" href="./css/signUp-agree.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>


</head>
<body>

    <div class="wrap">
        <main>
            <div class="common-frame">
                <div class="signUp-logo">
                    <a href="./index.html"><img src="./img/0-imgPublishing/icon/signUp-logo.svg" alt="크리니크 로고"></a>
                </div>
                <div class="signUp-box">
                    <ul class="su-process">
                        <li>
                            <img src="./img/0-imgPublishing/icon/su-process1.1.svg" alt="이용 약관 동의 및 인증">
                            <span>이용 약관 동의 및 인증</span>
                        </li>
                        <li>
                            <img src="./img/0-imgPublishing/icon/su-process1.2.svg" alt="이용약관 동의 및 인증">
                            <span>정보입력</span>
                        </li>
                        <li>
                            <img src="./img/0-imgPublishing/icon/su-process1.3.svg" alt="이용약관 동의 및 인증">
                            <span>가입완료</span>
                        </li>
                    </ul>
                    <div class="su-content">
                        <h2>이용 약관 동의 및 인증</h2>
                        <p>아래 필수 약관을 읽고 동의하시면, 회원가입이 완료됩니다.</p>
                        <ul class="check-list">
                            <li class="checkbox-group">
                                <input type="checkbox" id="terms1">
                                <label for="terms1"><span>전체 동의하기</span></label>
                            </li>
                            <li class="checkbox-group">
                                <div>
                                    <input type="checkbox" id="terms2">
                                    <label for="terms2"><span>[필수]</span> 서비스 이용 약관에 동의합니다.</label>
                                </div>
                                <span>약관보기</span>
                            </li>
                            <li class="checkbox-group">
                                <div>
                                    <input type="checkbox" id="terms3">
                                    <label for="terms3"><span>[필수]</span> 개인정보의 수집 및 이용에 동의합니다.</label>
                                </div>
                                <span>약관보기</span>
                            </li>
                            <li class="checkbox-group">
                                <input type="checkbox" id="terms4">
                                <label for="terms4"><span>[필수]</span> 만 14세 이상입니다.</label>
                            </li>
                            <li class="checkbox-group">
                                <div>
                                    <input type="checkbox" id="terms5">
                                    <div>
                                        <label for="terms5"><span>[선택]</span> 광고성 정보 수신 동의합니다.</label>
                                        <p>마케팅 수신 및 홍보 목적의 개인정보 수집 및 이용에 미동의 시,<br>마케팅 목적의 소식 밑 특별 혜택 정보를 받아보실 수 없습니다.</p>
                                    </div>
                                </div>
                                <span>약관보기</span>
                            </li>
                        </ul>
                    </div>
                    <button class="btn-next">다음</button>
                </div>
                <div class="su-foot">
                    <ul class="bd2">
                        <li><a href="#">이용약관</a></li>
                        <li><a href="#">개인정보처리방침</a></li>
                        <li><a href="#">쿠키정책</a></li>
                    </ul>
                    <p>© Clinique Laboratories, 취업용도의 포트폴리오 웹사이트입니다.</p>
                </div>
            </div>
        </main>

    </div>

</body>
</html>
