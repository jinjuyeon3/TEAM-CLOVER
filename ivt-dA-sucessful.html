<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원탈퇴 완료</title>
    <link rel="stylesheet" href="./css/font.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/system.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/index.css">

    <link rel="stylesheet" href="./css/ivt-dA-sucessful.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <script src="./js/ivt-dA-popup.js"></script>
</head>
<body>
    <!-- 모달 팝업 영역 -->
    <div class="modal"></div>
    <div class="popup">
        <div class="content-popup">
            <img src="./img/0-imgPublishing/icon/ivt-dA-sucessful.svg" alt="회원 탈퇴 완료 아이콘">
            <p class="fwb">회원 탈퇴가 완료되었습니다.</p>
            <p class="det">그동안 이용해주셔서 감사합니다.</p>
        </div>
        <div class="popup-controler">
            <a href="./index.html" class="btn-home bd2 fwb">확인</a>
        </div>
    </div>

    <!-- 전체 콘텐츠 영역 -->
    <main>
        <div class="common-frame">
            <div class="logo">
                <a href="./index.html"><img src="./img/0-imgPublishing/icon/signUp-logo.svg" alt="크리니크 로고"></a>
            </div>
            <div class="uProfile">
                <img src="./img/0-imgPublishing/icon/uProfile.svg" alt="사용자 프로필 사진">
                <span class="fwb">연진주님</span>
            </div>
            <form action="#" class="pwForm">
                <h1>비밀번호 재확인</h1>
                <p class="det">안전한 회원정보 사용을 위해 비밀번호를 다시 한 번 입력해주세요.</p>
                <div class="input-group">
                    <label for="userName" class="visually-hidden">아이디</label>
                    <input type="text" placeholder="yeonjinju-babo">
                </div>
                <div class="input-group">
                    <label for="userPw" class="visually-hidden">비밀번호</label>
                    <input type="password" placeholder="비밀번호">
                </div>
                <button type="submit" class="btn-ok fwb">확인</button>
            </form>
        </div>
    </main>
</body>
</html>
