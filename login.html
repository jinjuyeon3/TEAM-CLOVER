<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>

    <!-- 검색 엔진이 페이지 색인 허용시킴 -->
    <meta name="robots" content="index, follow">
    <link rel="icon" size="32x32" type="image/png" href="./img/0-imgPublishing/favicon.png">
    
    <link rel="stylesheet" href="./css/font.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/system.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/index.css">

    <link rel="stylesheet" href="./css/login.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <script src="./js/login.js"></script>
</head>
<body>
    <main>
        <div class="common-frame">
            <div class="login-logo">
                <a href="./index.html"><img src="./img/0-imgPublishing/icon/signUp-logo.svg" alt="크리니크 로고"></a>
            </div>
            <div class="login-wrap">
                <div class="login-box">
                    <!-- 탭 메뉴 -->
                    <div class="tab-menu fwb">
                        <button type="button" class="active">로그인</button>
                        <button type="button">비회원(주문조회)</button>
                    </div>
                    <!-- 로그인 폼 -->
                    <form action="#" class="loginForm tab-content active">
                        <div class="input-group">
                            <label for="userId" class="visually-hidden">아이디</label>
                            <input type="text" placeholder="아이디를 입력하세요" required>
                        </div>
                        <div class="input-group">
                            <label for="userPw" class="visually-hidden">비밀번호</label>
                            <input type="password" placeholder="비밀번호를 입력하세요" required>
                        </div>
                        <button type="submit" class="btn-login fwb">
                            <a href="./index.html">로그인</a>
                        </button>
                        <!-- 아래 옵션 영역 -->
                        <div class="login-option">
                            <div class="checkbox-group">
                                <input type="checkbox" id="terms1">
                                <label for="terms1">아이디 저장</label>
                            </div>
                            <div class="find-menu">
                                <a href="#">비밀번호 찾기</a>
                                <span>|</span>
                                <a href="#">아이디 찾기</a>
                                <span>|</span>
                                <a href="./signUp-agree.html">회원가입</a>
                            </div>
                        </div>
                        <!-- 간편 로그인 -->
                        <ul class="sns-login">
                            <li>
                                <a href="#">
                                    <img src="./img/0-imgPublishing/icon/login-kakao.svg" alt="카카오톡으로 로그인하기">
                                </a>
                            </li>
                            <li>
                                <a href="#">
                                    <img src="./img/0-imgPublishing/icon/login-naver.svg" alt="네이버로 로그인하기">
                                </a>
                            </li>
                        </ul>
                    </form>
                    <!-- 비회원주문 폼 -->
                    <form action="#" class="gestForm tab-content">
                        <div class="input-group">
                            <label for="userName" class="visually-hidden">주문자명</label>
                            <input type="text" placeholder="주문자명" required>
                        </div>
                        <div class="input-group">
                            <label for="userPw" class="visually-hidden">주문번호</label>
                            <input type="text" placeholder="주문번호" required>
                        </div>
                        <button type="submit" class="btn-oc fwb">주문조회</button>
                        <ul class="gestNotice bd2">
                            <li>&bull; 비회원 고객님께서 주문하신 제품의 목록과 배송상태를 확인할 수 있습니다.</li>
                            <li>&bull; 주문번호는 주문 시 전송된 이메일 혹은 카카오 알림톡에서 확인 가능합니다.</li>
                            <li>&bull; 주문번호를 잊어버린 경우, 1:1 상담 및 고객케어센터로 문의 바랍니다.</li>
                        </ul>
                    </form>
                </div>
            </div>
            <div class="sub-img">
                <img src="./img/0-imgPublishing/etc/login-subimg.jpg" alt="공식몰에서만 누리는 특별한 혜택">
            </div>

            <div class="su-foot">
                <ul class="bd2">
                    <li><a href="#">이용약관</a></li>
                    <li><a href="#">개인정보처리방침</a></li>
                    <li><a href="#">쿠키정책</a></li>
                </ul>
                <p>© Clinique Laboratories, 취업용도의 포트폴리오 웹사이트입니다.</p>
            </div>
        </div>
    </main>
    

    
</body>
</html>
